<!doctype html>
<html>
  <head>
    <title>Meme Bot Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        margin: 0;
        padding: 40px;
      }

      h1 {
        margin-bottom: 30px;
      }

      .dashboard {
        max-width: 1200px;
        margin: auto;
      }

      /* stat cards */

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .card {
        background: linear-gradient(145deg, #1e1e1e, #161616);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      .card h3 {
        margin: 0;
        font-size: 14px;
        color: #bbb;
      }

      .card p {
        font-size: 26px;
        margin-top: 10px;
        font-weight: bold;
      }

      /* charts */

      .chart-container {
        background: #1b1b1b;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
      }

      canvas {
        background: white;
        border-radius: 8px;
      }

      /* loading */

      .loading {
        color: #aaa;
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <h1>📊 Meme AI Dashboard</h1>

      <div id="stats" class="stats loading">Loading dashboard...</div>

      <div class="chart-container">
        <h2>Subreddit Reward Performance</h2>
        <canvas id="rewardChart"></canvas>
      </div>

      <div class="chart-container">
        <h2>Videos Generated per Subreddit</h2>
        <canvas id="videoChart"></canvas>
      </div>
    </div>

    <script>
      fetch("data.json")
        .then((r) => r.json())
        .then((data) => {
          /* ---------- stats ---------- */

          document.getElementById("stats").innerHTML = `

<div class="card">
<h3>Total Memes</h3>
<p>${data.total_memes}</p>
</div>

<div class="card">
<h3>Total Videos</h3>
<p>${data.total_videos}</p>
</div>

<div class="card">
<h3>Average Reward</h3>
<p>${data.avg_reward?.toFixed(3) ?? "0"}</p>
</div>

`;

          /* ---------- empty data protection ---------- */

          if (!data.subreddits || data.subreddits.length === 0) {
            console.warn("No subreddit analytics yet");
            return;
          }

          const labels = data.subreddits.map((s) => s.subreddit);
          const rewards = data.subreddits.map((s) => s.avg_reward ?? 0);
          const videos = data.subreddits.map((s) => s.videos ?? 0);

          /* ---------- reward chart ---------- */

          new Chart(document.getElementById("rewardChart"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                {
                  label: "Average Reward",
                  data: rewards,
                  backgroundColor: "#4cafef",
                },
              ],
            },
            options: {
              responsive: true,
              plugins: {
                legend: { display: false },
              },
              scales: {
                y: {
                  beginAtZero: true,
                },
              },
            },
          });

          /* ---------- video chart ---------- */

          new Chart(document.getElementById("videoChart"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                {
                  label: "Videos",
                  data: videos,
                  backgroundColor: "#66bb6a",
                },
              ],
            },
            options: {
              responsive: true,
              plugins: {
                legend: { display: false },
              },
              scales: {
                y: {
                  beginAtZero: true,
                },
              },
            },
          });
        });
    </script>
  </body>
</html>
