<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>MemeBot Control Center</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      /* ─────────────────────────────
   PALANTIR STYLE UI
───────────────────────────── */

      :root {
        --bg: #0b0f14;
        --panel: #0f141b;
        --border: #1f2a36;

        --text: #e6edf3;
        --muted: #7d8a97;

        --accent: #22c55e;
        --accent2: #3b82f6;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          system-ui,
          Segoe UI;
      }

      /* layout */

      .container {
        max-width: 1500px;
        margin: auto;
        padding: 25px;

        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* header */

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;

        border-bottom: 1px solid var(--border);
        padding-bottom: 14px;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .status {
        font-size: 12px;
        color: var(--accent);

        display: flex;
        gap: 8px;
        align-items: center;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }

      /* KPI grid */

      .kpis {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 14px;
      }

      .kpi {
        background: var(--panel);
        border: 1px solid var(--border);

        padding: 16px;

        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .kpi-title {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.05em;
      }

      .kpi-value {
        font-size: 26px;
        font-weight: 600;
      }

      /* main grid */

      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }

      /* panel */

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);

        padding: 16px;
      }

      .panel-title {
        font-size: 13px;
        letter-spacing: 0.04em;
        color: var(--muted);

        margin-bottom: 10px;
      }

      /* table */

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        font-size: 11px;
        color: var(--muted);
        text-align: left;
        padding: 8px;

        border-bottom: 1px solid var(--border);
      }

      td {
        font-size: 13px;
        padding: 8px;

        border-bottom: 1px solid var(--border);
      }

      /* small panels */

      .side {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* activity */

      .feed {
        font-size: 12px;
        color: var(--muted);

        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      /* charts */

      canvas {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- HEADER -->

      <div class="header">
        <div class="title">MemeBot Command Center</div>

        <div class="status">
          <div class="dot"></div>
          SYSTEM ONLINE
        </div>
      </div>

      <!-- KPIs -->

      <div class="kpis">
        <div class="kpi">
          <div class="kpi-title">MEMES INGESTED</div>
          <div class="kpi-value" id="memes">0</div>
        </div>

        <div class="kpi">
          <div class="kpi-title">VIDEOS GENERATED</div>
          <div class="kpi-value" id="videos">0</div>
        </div>

        <div class="kpi">
          <div class="kpi-title">TOTAL VIEWS</div>
          <div class="kpi-value" id="views">0</div>
        </div>

        <div class="kpi">
          <div class="kpi-title">AVG REWARD</div>
          <div class="kpi-value" id="reward">0</div>
        </div>

        <div class="kpi">
          <div class="kpi-title">ACTIVE SOURCES</div>
          <div class="kpi-value" id="sources">0</div>
        </div>
      </div>

      <!-- MAIN GRID -->

      <div class="grid">
        <!-- LEFT -->

        <div class="panel">
          <div class="panel-title">SUBREDDIT PERFORMANCE</div>

          <canvas id="subChart"></canvas>

          <br />

          <table>
            <thead>
              <tr>
                <th>SUBREDDIT</th>
                <th>VIDEOS</th>
                <th>AVG REWARD</th>
              </tr>
            </thead>

            <tbody id="subs"></tbody>
          </table>
        </div>

        <!-- RIGHT -->

        <div class="side">
          <div class="panel">
            <div class="panel-title">REWARD TREND</div>

            <canvas id="rewardChart"></canvas>
          </div>

          <div class="panel">
            <div class="panel-title">TOP PERFORMING VIDEOS</div>

            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>SUB</th>
                  <th>VIEWS</th>
                  <th>RWD</th>
                </tr>
              </thead>

              <tbody id="videosTable"></tbody>
            </table>
          </div>

          <div class="panel">
            <div class="panel-title">ACTIVITY FEED</div>

            <div class="feed" id="feed"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* load json */

      async function loadData() {
        const res = await fetch("./data.json");
        const data = await res.json();

        renderKPIs(data);
        renderSubreddits(data);
        renderVideos(data);
        renderCharts(data);
        renderFeed(data);
      }

      /* KPI */

      function renderKPIs(data) {
        memes.textContent = data.total_memes;
        videos.textContent = data.total_videos;
        views.textContent = data.total_views.toLocaleString();
        reward.textContent = data.avg_reward?.toFixed(3) ?? "-";
        sources.textContent = data.active_sources;
      }

      /* subreddit table */

      function renderSubreddits(data) {
        subs.innerHTML = data.subreddits
          .map(
            (s) => `

<tr>

<td>r/${s.subreddit}</td>

<td>${s.videos}</td>

<td>${s.avg_reward ? s.avg_reward.toFixed(3) : "-"}</td>

</tr>

`,
          )
          .join("");
      }

      /* videos */

      function renderVideos(data) {
        videosTable.innerHTML = data.top_videos
          .map(
            (v) => `

<tr>

<td >${v.video_id.slice(0, 10)}</td>

<td>${v.subreddit}</td>

<td>${v.views}</td>

<td>${v.reward.toFixed(3)}</td>

</tr>

`,
          )
          .join("");
      }

      /* charts */

      let subChart;
      let rewardChart;

      function renderCharts(data) {
        const active = data.subreddits.filter((s) => s.videos > 0);

        if (subChart) subChart.destroy();

        subChart = new Chart((subChart = document.getElementById("subChart")), {
          type: "bar",

          data: {
            labels: active.map((s) => "r/" + s.subreddit),
            datasets: [
              {
                data: active.map((s) => s.videos),
                backgroundColor: "#3b82f6",
              },
            ],
          },

          options: {
            plugins: { legend: { display: false } },
          },
        });

        if (rewardChart) rewardChart.destroy();

        rewardChart = new Chart(
          document.getElementById("rewardChart"),

          {
            type: "line",

            data: {
              labels: data.reward_trend.map((_, i) => i + 1),
              datasets: [
                {
                  data: data.reward_trend,
                  borderColor: "#22c55e",
                  tension: 0.4,
                },
              ],
            },

            options: {
              plugins: { legend: { display: false } },
            },
          },
        );
      }

      /* activity feed */

      function renderFeed(data) {
        const now = new Date();

        feed.innerHTML = `

<div>${now.toLocaleTimeString()}  Analytics updated</div>
<div>${now.toLocaleTimeString()}  ${data.total_videos} videos tracked</div>
<div>${now.toLocaleTimeString()}  ${data.total_memes} memes processed</div>
<div>${now.toLocaleTimeString()}  reward ${data.avg_reward.toFixed(3)}</div>

`;
      }

      /* auto refresh */

      loadData();

      setInterval(loadData, 30000);
    </script>
  </body>
</html>
